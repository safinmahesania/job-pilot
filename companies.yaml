    active: true
  - name: Relay
    ats: ashby
    identifier: relayfi
    active: true
  - name: Float
    ats: ashby
    identifier: Float
    active: true

  # ---- Workday ---- (banks fetch all jobs; filter/AI narrows)
  - name: TD Bank
    ats: workday
    tenant: td
    host: wd3
    site: TD_Bank_Careers
    max_pages: 5
    active: true
  - name: CIBC
    ats: workday
    tenant: cibc
    host: wd3
    site: search
    max_pages: 5
    active: true
  - name: RBC
    ats: workday
    tenant: rbc
    host: wd3
    site: RBCGLOBAL1
    max_pages: 5
    active: true
  - name: RBC Early Talent
    ats: workday
    tenant: rbc
    host: wd3
    site: RBCEARLYTALENT1
    max_pages: 5
    active: true
  - name: Sonder
    ats: workday
    tenant: sonder
    host: wd1
    site: Join_Sonder
    max_pages: 5
    active: true
  - name: CIBC Campus
    ats: workday
    tenant: cibc
    host: wd3
    site: campus
    max_pages: 5
    active: true
  - name: BMO
    ats: workday
    tenant: bmo
    host: wd3
    site: External
    max_pages: 5
    active: true
  - name: BMO Campus
    ats: workday
    tenant: bmo
    host: wd3
    site: Campus
    max_pages: 5
    active: true

  # ---- Oracle ---- (JPMorgan: huge/US-heavy, keyword-narrowed)
  - name: JPMorgan Chase
    ats: oracle
    host: jpmc.fa.oraclecloud.com
    site: CX_1001
    query: software developer
    max_pages: 5
    active: true

  # ---- Phenom (HTML scrape) ----
  - name: Scotiabank
    ats: phenom
    base: https://jobs.scotiabank.com
    query: developer
    max_pages: 5
    active: true

  # ═══════════════ Job portals (broad, global remote) ═══════════════

  - name: "The Muse — entry-level SWE Toronto"
    ats: themuse
    category: "Software Engineering"
    level: "Entry Level"
    location: "Toronto, Canada"
    max_pages: 5
    active: true
  - name: "The Muse — internships Toronto"
