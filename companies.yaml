# ============================================================
#  JobPilot — sources config
#  Adapters available: greenhouse, lever, ashby, workday, oracle, phenom,
#                      themuse, remotive, remoteok, weworkremotely, jobspresso
#  scope: global  -> location filter requires Canada explicitly (global remote boards)
#
#  NOTE: newly added company identifiers (Ashby + Sonder Workday) are best-guess.
#  Confirm the exact token/tenant/site from your discovered_companies.yaml if any 404s.
# ============================================================

companies:

  # ═══════════════ Company ATS boards (Canada tech employers) ═══════════════

  # ---- Greenhouse ----
  - name: DoorDash Canada
    ats: greenhouse
    identifier: doordashcanada
    active: true
  - name: Properly
    ats: greenhouse
    identifier: pine
    active: true

  # ---- Lever ----
  - name: Mistplay
    ats: lever
    identifier: mistplay
    active: true
  - name: PolicyMe
    ats: lever
    identifier: policyme
    active: true
  - name: Fullscript
    ats: lever
    identifier: fullscript
    active: true

  # ---- Ashby ---- (verify identifiers vs discovered_companies.yaml)
  - name: Cohere
    ats: ashby
    identifier: cohere
    active: true
  - name: 1Password
    ats: ashby
    identifier: 1password
    active: true
  - name: Wealthsimple
    ats: ashby
    identifier: wealthsimple
    active: true
  - name: Benevity
    ats: ashby
    identifier: benevity
    active: true
  - name: Absorb Software
    ats: ashby
    identifier: absorblms
    active: true
  - name: Loopio
    ats: ashby
