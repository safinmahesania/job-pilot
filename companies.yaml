# Registry of companies to ingest from.
# `ats` routes each company to an adapter; `identifier` is the one value
# that adapter needs (board token / handle). Only `custom` entries scrape HTML.
companies:
  - name: DoorDash Canada
    ats: greenhouse
    identifier: doordashcanada        # the board token
    careers_url: https://careersatdoordash.com/job-search/
    active: true

  - name: Beta Labs
    ats: lever
    identifier: betalabs        # the handle in the lever URL
    careers_url: https://www.shopify.com/careers
    active: false

  - name: Gamma Inc
    ats: ashby
    identifier: gamma
    careers_url: https://jobs.ashbyhq.com/gamma
    active: false

  - name: Delta Systems
    ats: custom                 # no known ATS — the fragile path
    careers_url: https://delta.com/careers
    scrape:
      list_selector: ".job-listing"
      title_selector: ".job-title"
      link_selector: "a.apply"
    active: false               # leave off until the others work

  - name: "The Muse — entry-level SWE Toronto"
    ats: themuse
    category: "Software Engineering"
    level: "Entry Level"
    location: "Toronto, Canada"
    max_pages: 5
    active: true

  - name: "The Muse — internships Toronto"
    ats: themuse
    category: "Software Engineering"
    level: "Internship"
    location: "Toronto, Canada"
    max_pages: 5
    active: true

  - name: "Remotive — python remote"
    ats: remotive
    limit: 40
    active: true


