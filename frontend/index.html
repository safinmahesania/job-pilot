<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPilot</title>
  <link rel="icon" href="/logo.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: '#B4791A', brandtint: '#F7EDD8', branddark: '#7A4E0C'
    } } } };
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #FAF9F7; }
    [x-cloak] { display: none !important; }
    .nav { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; font-size:13px; color:#6b7280; cursor:pointer; }
    .nav:hover { background:#F3F1EC; }
    .nav.active { background:#F7EDD8; color:#7A4E0C; font-weight:500; }
    .nav .ti { font-size:17px; }
    .jd { word-break: break-word; }
    .jd > *:first-child { margin-top: 0; }
    .jd h3, .jd h4 { font-weight: 600; font-size: 0.9rem; margin: 1.1rem 0 0.4rem; color: #111827; }
    .jd p { margin: 0 0 0.7rem; }
    .jd ul, .jd ol { margin: 0 0 0.7rem 1.4rem; }
    .jd ul { list-style: disc; } .jd ol { list-style: decimal; }
    .jd li { margin: 0.2rem 0; }
    .jd strong, .jd b { font-weight: 600; }
    .jd a { color: #B4791A; text-decoration: underline; word-break: break-all; }
    .jd img { display: none !important; }
  </style>
</head>
<body class="text-gray-800">
<div x-data="jobpilot()" x-init="load()" x-cloak class="flex min-h-screen max-w-6xl mx-auto">

  <!-- Sidebar -->
  <aside class="w-56 shrink-0 border-r border-gray-200 flex flex-col px-3 py-5">
    <div class="flex items-center gap-2 px-2 pb-5">
      <svg viewBox="0 0 48 48" class="w-8 h-8"><rect width="48" height="48" rx="12" fill="#B4791A"/><circle cx="24" cy="24" r="14" fill="none" stroke="#fff" stroke-width="1.3" opacity="0.9"/><path d="M24 10 L26.6 24 L24 24 Z" fill="#fff"/><path d="M24 10 L24 24 L21.4 24 Z" fill="#F0DCB4"/><path d="M24 38 L26.6 24 L24 24 Z" fill="#26375C"/><path d="M24 38 L24 24 L21.4 24 Z" fill="#1F2D4D"/><circle cx="24" cy="24" r="1.8" fill="#fff"/></svg>
      <span class="text-lg font-semibold">JobPilot</span>
    </div>

    <div class="text-[11px] text-gray-400 px-2 py-1">Jobs</div>
    <template x-for="n in jobsNav" :key="n.k">
      <div class="nav" :class="tab===n.k && 'active'" @click="tab=n.k; load()">
        <i class="ti" :class="n.icon"></i>
        <span class="flex-1" x-text="n.label"></span>
        <span class="text-xs" :class="tab===n.k ? 'text-branddark' : 'text-gray-400'"
          x-text="counts[n.k] != null ? counts[n.k] : ''"></span>
      </div>
    </template>

    <div class="h-px bg-gray-200 mx-2 my-3"></div>
    <div class="text-[11px] text-gray-400 px-2 py-1">System</div>
    <template x-for="n in sysNav" :key="n.k">
      <div class="nav" :class="tab===n.k && 'active'" @click="tab=n.k; load()">
        <i class="ti" :class="n.icon"></i>
        <span x-text="n.label"></span>
      </div>
    </template>

    <div class="mt-auto px-1">
      <button @click="runNow()" :disabled="running"
        class="w-full h-9 rounded-lg bg-brand text-white text-sm flex items-center justify-center gap-1.5 disabled:opacity-50">
        <i class="ti" :class="running ? 'ti-loader-2 animate-spin' : 'ti-player-play'"></i>
        <span x-text="running ? 'Running…' : 'Run now'"></span>
      </button>
      <div x-show="lastRun" class="text-[11px] text-gray-400 text-center mt-2">Last run: <span x-text="lastRun"></span></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-w-0 px-6 py-6">

    <!-- Job views -->
    <div x-show="isJobView()">
      <div class="flex items-center gap-2 mb-4">
        <div class="flex-1 flex items-center gap-2 h-9 px-3 border border-gray-200 rounded-lg bg-white">
          <i class="ti ti-search text-gray-400"></i>
          <input x-model="q" placeholder="Search title, company, skill…" class="flex-1 text-sm outline-none bg-transparent">
        </div>
        <span class="text-xs text-gray-400 capitalize" x-text="tab + ' · ' + filtered().length"></span>
      </div>

      <div x-show="loading" class="text-center text-gray-400 py-20 text-sm">Loading…</div>
      <div x-show="!loading && filtered().length===0" class="text-center text-gray-400 py-20 text-sm">
        <i class="ti ti-inbox text-3xl block mb-2 opacity-50"></i>
        No jobs in <span x-text="tab"></span> yet.
      </div>

      <div class="flex flex-col gap-3">
        <template x-for="job in filtered()" :key="job.id">
          <div class="flex gap-3.5 bg-white border border-gray-200 rounded-xl p-4"
            :style="`border-left:3px solid ${tier(job.score).stripe}`">
            <div class="shrink-0 w-14 h-14 rounded-full flex flex-col items-center justify-center"
              :style="`background:${tier(job.score).bg}`">
              <span class="text-xl font-semibold leading-none" :style="`color:${tier(job.score).fg}`" x-text="Math.round(job.score)"></span>
              <span class="text-[10px]" :style="`color:${tier(job.score).fg}`">match</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline justify-between gap-2">
                <span class="font-medium cursor-pointer hover:text-brand" @click="openDetail(job)" x-text="job.title"></span>
                <span class="text-xs text-gray-400 whitespace-nowrap" x-text="job.posted_date ? timeAgo(job.posted_date) : ''"></span>
              </div>
              <div class="text-[13px] text-gray-500 mt-0.5">
                <span x-text="job.company"></span> · <span x-text="job.location"></span>
                <span class="text-gray-400" x-show="job.job_type && job.job_type!=='Unknown'"> · <span x-text="job.job_type"></span></span>
                <span class="text-amber-700" x-show="job.deadline"> · <i class="ti ti-calendar text-xs"></i> <span x-text="job.deadline"></span></span>
              </div>
              <div class="text-[13px] rounded-md px-2.5 py-2 my-2.5 leading-relaxed flex gap-1.5"
                style="background:#F7EDD8; color:#7A4E0C;" x-show="job.rationale">
                <i class="ti ti-bulb mt-0.5"></i><span x-text="job.rationale"></span>
              </div>
              <div class="flex items-center gap-2">
                <a :href="job.apply_url" target="_blank"
                  class="text-[13px] h-8 px-4 rounded-md bg-brand text-white flex items-center gap-1"><i class="ti ti-external-link"></i> Apply</a>
                <template x-if="tab!=='dismissed'">
                  <div class="flex items-center gap-2">
                    <button @click="setStatus(job,'saved')" class="text-[13px] h-8 px-3 rounded-md border border-gray-200 hover:bg-gray-50">Save</button>
                    <button @click="setStatus(job,'dismissed')" class="text-[13px] h-8 px-3 rounded-md text-gray-400 hover:bg-gray-50">Dismiss</button>
                  </div>
                </template>
                <template x-if="tab==='dismissed'">
                  <button @click="setStatus(job,'surfaced')" class="text-[13px] h-8 px-3 rounded-md border border-gray-200 hover:bg-gray-50"><i class="ti ti-arrow-back-up"></i> Restore</button>
                </template>
                <select @change="setStatus(job, $event.target.value)"
                  class="ml-auto text-[13px] h-8 px-2 rounded-md border border-gray-200 text-gray-600 bg-white">
                  <template x-for="s in statuses" :key="s"><option :value="s" :selected="job.status===s" x-text="cap(s)"></option></template>
                </select>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Stats -->
    <div x-show="tab==='stats'">
      <h2 class="text-lg font-semibold mb-4">Statistics</h2>
      <template x-if="stats">
        <div class="flex flex-col gap-5">
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-white border border-gray-200 rounded-xl p-4 text-center"><div class="text-2xl font-semibold" x-text="stats.total"></div><div class="text-xs text-gray-400 mt-1">Total jobs</div></div>
            <div class="bg-white border border-gray-200 rounded-xl p-4 text-center"><div class="text-2xl font-semibold" x-text="stats.feed_size"></div><div class="text-xs text-gray-400 mt-1">In feed</div></div>
            <div class="bg-white border border-gray-200 rounded-xl p-4 text-center"><div class="text-2xl font-semibold" x-text="stats.avg_score"></div><div class="text-xs text-gray-400 mt-1">Avg score</div></div>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4">
            <div class="text-sm font-medium mb-3">Application funnel</div>
            <template x-for="[label,key] in [['Surfaced','surfaced'],['Saved','saved'],['Applied','applied'],['Interview','interview'],['Offer','offer'],['Rejected','rejected'],['Dismissed','dismissed']]" :key="key">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs text-gray-500 w-20" x-text="label"></span>
                <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
                  <div class="h-full bg-brand rounded-full" :style="`width:${stats.total ? Math.max(4,100*stats.funnel[key]/stats.total) : 0}%`" x-show="stats.funnel[key]>0"></div>
                </div>
                <span class="text-xs font-medium text-gray-700 w-6 text-right" x-text="stats.funnel[key]"></span>
              </div>
            </template>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4">
            <div class="text-sm font-medium mb-3">Score distribution</div>
            <template x-for="[label,color] in [['80+','#1D9E75'],['70-79','#B4791A'],['60-69','#C0C0C0'],['<60','#E5A0A0']]" :key="label">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs text-gray-500 w-12" x-text="label"></span>
                <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
                  <div class="h-full rounded-full" :style="`width:${stats.total ? Math.max(4,100*stats.distribution[label]/stats.total) : 0}%; background:${color}`" x-show="stats.distribution[label]>0"></div>
                </div>
                <span class="text-xs font-medium text-gray-700 w-6 text-right" x-text="stats.distribution[label]"></span>
              </div>
            </template>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4">
            <div class="text-sm font-medium mb-3">By source</div>
            <template x-for="s in stats.sources" :key="s.source">
              <div class="flex items-center justify-between text-sm py-1 border-b border-gray-50 last:border-0">
                <span class="text-gray-700" x-text="s.source"></span>
                <span class="text-gray-500 text-xs"><span x-text="s.c"></span> jobs · avg <span class="font-medium text-gray-700" x-text="s.avg"></span></span>
              </div>
            </template>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4" x-show="stats.deadlines.length">
            <div class="text-sm font-medium mb-3">Upcoming deadlines</div>
            <template x-for="d in stats.deadlines" :key="d.title">
              <div class="flex items-center justify-between text-sm py-1">
                <span class="text-gray-700 truncate mr-3" x-text="d.title + ' — ' + d.company"></span>
                <span class="text-amber-700 text-xs whitespace-nowrap" x-text="d.deadline"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
      <div x-show="!stats" class="text-center text-gray-400 py-16 text-sm">Loading stats…</div>
    </div>

    <!-- Admin (source health) -->
    <div x-show="tab==='admin'">
      <h2 class="text-lg font-semibold mb-4">Admin</h2>
      <div class="text-sm text-gray-500 mb-3">Source health — last run per source</div>
      <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
        <template x-for="s in health" :key="s.name">
          <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 last:border-0">
            <span class="w-2 h-2 rounded-full shrink-0" :class="s.status==='ok' ? 'bg-green-500' : 'bg-red-500'"></span>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium" x-text="s.name"></div>
              <div class="text-xs text-gray-400"><span x-text="s.ats"></span><span x-show="s.error" class="text-red-500" x-text="' · ' + (s.error||'')"></span></div>
            </div>
            <div class="text-right text-xs text-gray-500 shrink-0">
              <div><span class="font-medium text-gray-700" x-text="s.fetched"></span> fetched</div>
              <div><span class="font-medium text-gray-700" x-text="s.kept"></span> kept</div>
            </div>
          </div>
        </template>
        <div x-show="health.length===0" class="px-4 py-8 text-center text-gray-400 text-sm">No run data yet. Hit "Run now".</div>
      </div>
    </div>

    <!-- Settings (threshold) -->
    <div x-show="tab==='settings'">
      <h2 class="text-lg font-semibold mb-4">Settings</h2>
      <div class="bg-white border border-gray-200 rounded-xl p-4 max-w-md">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm font-medium">Score threshold</span>
          <input type="number" min="0" max="100" x-model.number="threshold" @change="clampThreshold(); saveThreshold()"
            class="w-16 text-sm font-semibold text-brand text-right border border-gray-200 rounded-md px-2 py-1 outline-none">
        </div>
        <div class="text-xs text-gray-400 mb-3">Feed shows only jobs scoring at or above this.</div>
        <input type="range" min="0" max="100" step="1" x-model.number="threshold" @change="saveThreshold()" class="w-full accent-[#B4791A]">
        <div class="flex justify-between text-[11px] text-gray-400 mt-1"><span>0</span><span>50</span><span>100</span></div>
      </div>
    </div>

  </main>

  <!-- Detail modal -->
  <div x-show="detail" x-cloak @click="detail=null" class="fixed inset-0 bg-black/40 flex items-start justify-center p-4 overflow-y-auto z-50">
    <div @click.stop class="bg-white rounded-xl max-w-2xl w-full my-8 shadow-xl">
      <template x-if="detail">
        <div>
          <div class="flex items-start justify-between gap-3 p-5 border-b border-gray-100">
            <div class="flex gap-3">
              <div class="shrink-0 w-12 h-12 rounded-full flex flex-col items-center justify-center" :style="`background:${tier(detail.score).bg}`">
                <span class="text-lg font-semibold leading-none" :style="`color:${tier(detail.score).fg}`" x-text="Math.round(detail.score)"></span>
              </div>
              <div>
                <div class="font-semibold text-lg leading-tight" x-text="detail.title"></div>
                <div class="text-sm text-gray-500 mt-0.5"><span x-text="detail.company"></span> · <span x-text="detail.location"></span><span x-show="detail.job_type && detail.job_type!=='Unknown'"> · <span x-text="detail.job_type"></span></span></div>
                <div class="text-xs text-amber-700 mt-1" x-show="detail.deadline"><i class="ti ti-calendar"></i> Closes <span x-text="detail.deadline"></span></div>
              </div>
            </div>
            <button @click="detail=null" class="text-gray-400 hover:text-gray-700"><i class="ti ti-x text-xl"></i></button>
          </div>
          <div class="p-5 max-h-[60vh] overflow-y-auto">
            <div class="text-[13px] rounded-md px-3 py-2 mb-4 leading-relaxed flex gap-1.5" style="background:#F7EDD8; color:#7A4E0C;" x-show="detail.rationale"><i class="ti ti-bulb mt-0.5"></i><span x-text="detail.rationale"></span></div>
            <div class="grid grid-cols-3 gap-2 mb-4 text-center">
              <div class="bg-gray-50 rounded-md py-2"><div class="text-sm font-semibold text-gray-700" x-text="Math.round(detail.skills_score)"></div><div class="text-xs text-gray-400">Skills</div></div>
              <div class="bg-gray-50 rounded-md py-2"><div class="text-sm font-semibold text-gray-700" x-text="Math.round(detail.seniority_score)"></div><div class="text-xs text-gray-400">Seniority</div></div>
              <div class="bg-gray-50 rounded-md py-2"><div class="text-sm font-semibold text-gray-700" x-text="Math.round(detail.domain_score)"></div><div class="text-xs text-gray-400">Domain</div></div>
            </div>
            <div class="jd text-sm text-gray-700 leading-relaxed" x-html="formatJD(detail.description)"></div>
          </div>
          <div class="flex items-center gap-2 p-5 border-t border-gray-100">
            <a :href="detail.apply_url" target="_blank" class="text-sm h-9 px-5 rounded-md bg-brand text-white flex items-center gap-1"><i class="ti ti-external-link"></i> Apply</a>
            <button @click="setStatus(detail,'saved'); detail=null" class="text-sm h-9 px-4 rounded-md border border-gray-200 hover:bg-gray-50">Save</button>
            <a :href="detail.source_url" target="_blank" class="text-sm h-9 px-4 rounded-md text-gray-500 hover:bg-gray-50 flex items-center ml-auto">View posting <i class="ti ti-external-link ml-1"></i></a>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<script>
function jobpilot() {
  return {
    tab: 'feed', jobs: [], counts: {}, health: [], stats: null, loading: true, q: '', detail: null,
    running: false, lastRun: null, threshold: 70,
    statuses: ['surfaced','saved','applied','interview','offer','rejected','dismissed'],
    jobsNav: [
      {k:'feed', label:'Feed', icon:'ti-inbox'},
      {k:'saved', label:'Saved', icon:'ti-bookmark'},
      {k:'applied', label:'Applied', icon:'ti-send'},
      {k:'dismissed', label:'Dismissed', icon:'ti-archive'},
    ],
    sysNav: [
      {k:'stats', label:'Stats', icon:'ti-chart-bar'},
      {k:'admin', label:'Admin', icon:'ti-activity-heartbeat'},
      {k:'settings', label:'Settings', icon:'ti-settings'},
    ],

    isJobView() { return ['feed','saved','applied','dismissed'].includes(this.tab); },

    async load() {
      this.loading = true;
      const jobsP = this.isJobView()
        ? fetch(`/api/jobs?tab=${this.tab}`).then(r=>r.json()).catch(()=>[])
        : Promise.resolve(this.jobs);
      const [jobs, counts, health, settings, stats] = await Promise.all([
        jobsP,
        fetch('/api/counts').then(r=>r.json()).catch(()=>({})),
        fetch('/api/health').then(r=>r.json()).catch(()=>[]),
        fetch('/api/settings').then(r=>r.json()).catch(()=>({score_threshold:70})),
        fetch('/api/stats').then(r=>r.json()).catch(()=>null),
      ]);
      this.jobs = jobs;
      this.counts = { ...counts };
      this.health = health;
      this.threshold = settings.score_threshold ?? 70;
      this.stats = stats;
      this.loading = false;
    },

    formatJD(text) {
      if (!text) return 'No description available.';
      if (/<(p|ul|ol|li|br|div|h[1-6]|strong|b)\b/i.test(text)) return text;
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length);
      let html='';
      for (const line of lines) {
        const isH = /^[A-Z][A-Z0-9 &/\-'’()]{3,}$/.test(line) || /^[A-Za-z ]{2,40}:$/.test(line);
        html += isH ? `<h4>${esc(line.replace(/:$/,''))}</h4>` : `<p>${esc(line)}</p>`;
      }
      return html;
    },

    filtered() {
      if (!this.q.trim()) return this.jobs;
      const s = this.q.toLowerCase();
      return this.jobs.filter(j => (j.title||'').toLowerCase().includes(s) || (j.company||'').toLowerCase().includes(s) || (j.rationale||'').toLowerCase().includes(s));
    },

    openDetail(job){ this.detail = job; },

    async setStatus(job, status) {
      await fetch(`/api/jobs/${job.id}/status`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})});
      this.load();
    },

    async runNow() {
      const r = await fetch('/api/run', {method:'POST'});
      if (r.status===409){ alert('Already running'); return; }
      this.running = true; this.poll();
    },
    poll() {
      const iv = setInterval(async ()=>{
        const s = await fetch('/api/run/status').then(r=>r.json());
        this.running = s.running; this.lastRun = s.last_run;
        if (!s.running){ clearInterval(iv); this.load(); }
      }, 2000);
    },

    async saveThreshold() {
      this.clampThreshold();
      await fetch('/api/settings/threshold', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({value:this.threshold})});
      await this.load();
    },
    clampThreshold() {
      if (this.threshold==='' || isNaN(this.threshold)) this.threshold = 70;
      this.threshold = Math.max(0, Math.min(100, Math.round(this.threshold)));
    },

    tier(score) {
      if (score>=80) return {bg:'#1D9E75', fg:'#fff', stripe:'#1D9E75'};
      if (score>=70) return {bg:'#EDDCB8', fg:'#7A4E0C', stripe:'#B4791A'};
      return {bg:'#E5E7EB', fg:'#374151', stripe:'#E5E7EB'};
    },
    cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); },
    timeAgo(d){ try{ const days=Math.floor((Date.now()-new Date(d))/8.64e7); return days<=0?'today':days+'d ago'; }catch{ return ''; } },
  };
}
</script>
</body>
</html>
