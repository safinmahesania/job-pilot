# Gradual typing. The codebase was written without type annotations, so turning mypy
# on at full strictness would surface dozens of findings at once — most of them in
# dynamic JSON handling where the value genuinely is "some shape the model returned".
# That is noise that would train everyone to ignore the type checker.
#
# So this starts lenient and is meant to be tightened over time: it catches the errors
# that are almost always real bugs (a name that isn't defined, an int compared to
# None) without demanding a full annotation of every dict that holds an LLM response.
# As modules get typed, move them into the strict section at the bottom.

[mypy]
python_version = 3.11
ignore_missing_imports = True
# The high-signal, low-noise checks — the ones that catch real mistakes.
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
# Not yet: these would light up the whole dynamic-JSON surface.
disallow_untyped_defs = False
check_untyped_defs = False

# Third-party stubs we don't have and don't need to type-check.
[mypy-ollama.*]
ignore_missing_imports = True

[mypy-fpdf.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

# ── Modules that are fully typed and held to a higher standard. ──
# Add a module here once its functions are annotated; mypy will then enforce it.
[mypy-src.paths]
disallow_untyped_defs = True

[mypy-src.logs]
disallow_untyped_defs = True
